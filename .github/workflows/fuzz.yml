name: Fuzz

# Daily fuzz run for the cargo-fuzz harness under fuzz/. H.261's
# decoder (20-bit PSC scanner -> picture header -> GBSC GOB scanner
# -> MBA/MTYPE/MVD/CBP VLC walk -> TCOEFF VLC + 20-bit escape -> 8x8
# IDCT + integer-pel MC + §3.2.3 loop filter) is the surface worth
# fuzzing; there is no external library oracle worth pulling in (and
# the clean-room wall bars any reference codec source anyway), so
# this is a decode-only panic-free harness: one target gets the
# whole 30-minute budget.

on:
  schedule:
    - cron: "17 5 * * *"   # daily 05:17 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      time_budget_seconds: 1800
    secrets: inherit
